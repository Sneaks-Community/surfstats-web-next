name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run Linter
      run: npm run lint

    - name: Build Next.js app
      run: npm run build
      env:
        # Provide dummy env vars so the build doesn't fail if it requires them at build time
        STEAM_API_KEY: dummy_key
        SERVERS_JSON: '[]'
